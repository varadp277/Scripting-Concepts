<!DOCTYPE html>
<html>
<head>
    <title>Age Validation</title>
</head>
<body>

<h2>Age Validation Form</h2>

<label>Enter Age:</label>
<input type="text" id="age">
<button onclick="validateAge()">Submit</button>

<p id="result"></p>

<script>
function validateAge() {
    try {
        let age = document.getElementById("age").value;
        age = Number(age);

        if (isNaN(age)) {
            throw "Age must be a number";
        }

        if (age <= 0) {
            throw "Invalid age";
        }

        if (age < 18) {
            document.getElementById("result").innerHTML = "You are a Minor";
        } else {
            document.getElementById("result").innerHTML = "You are an Adult";
        }
    }
    catch (error) {
        document.getElementById("result").innerHTML = "Error: " + error;
    }
}
</script>

</body>
</html>

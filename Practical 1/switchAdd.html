<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Switch Case:Calculator</title>
</head>
<body>
    <script>
    let num1 = Number(prompt("Enter first number:"));
    let num2 = Number(prompt("Enter second number:"));
    let choice = prompt(
        "Choose operation:\n" +
        "+ for Addition\n" +
        "- for Subtraction\n" +
        "* for Multiplication\n" +
        "/ for Division"
    );

    let result;

    switch (choice) {
        case "+":
            result = num1 + num2;
            break;

        case "-":
            result = num1 - num2;
            break;

        case "*":
            result = num1 * num2;
            break;

        case "/":
            if (num2 === 0) {
                document.write("Error: Division by zero is not allowed");
                break;
            }
            result = num1 / num2;
            break;

        default:
            document.write("Invalid operation");
    }

    if (result !== undefined) {
        document.write("Result: " + result);
    }
</script>

</body>
</html>

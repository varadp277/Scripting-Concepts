<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nested If-Else</title>
</head>
<body>
    <h1>Nested</h1>

    <script>
    let num = 10;

    if (num > 0) {
        if (num % 2 === 0) {
            document.write(num + " is Positive and Even");
        } else {
            document.write(num + " is Positive and Odd");
        }
    } else {
        document.write(num + " is Not Positive");
    }
</script>


</body>
</html>
